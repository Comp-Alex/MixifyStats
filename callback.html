<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MixifyStats | Connecting Spotify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #06070d;
        --card: rgba(14, 17, 29, 0.92);
        --text: #f6f7fb;
        --muted: #8a90a6;
        --accent: #7c5cff;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Inter', system-ui, sans-serif;
        background: radial-gradient(circle at top left, #151a2d 0, var(--bg) 45%, #040507 100%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(100%, 540px);
        padding: 34px;
        border-radius: 28px;
        background: linear-gradient(180deg, rgba(18, 34, 16, 0.98), rgba(10, 18, 11, 0.96));
        box-shadow: 0 28px 85px rgba(0, 0, 0, 0.28);
        text-align: center;
        border: 1px solid rgba(111, 209, 142, 0.14);
      }

      .brand-logo {
        width: 58px;
        height: 58px;
        margin: 0 auto 18px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        background: radial-gradient(circle at top left, rgba(111, 209, 142, 0.22), rgba(14, 27, 14, 0.92));
        border: 1px solid rgba(111, 209, 142, 0.18);
      }

      .brand-logo svg {
        width: 34px;
        height: 34px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.75rem;
      }

      p {
        color: var(--muted);
        line-height: 1.6;
      }

      .dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--accent);
        margin: 0 4px;
        animation: pulse 1s infinite ease-in-out;
      }

      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes pulse {
        0%, 100% { transform: scale(0.8); opacity: 0.6; }
        50% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand-logo" aria-hidden="true">
        <svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
          <circle cx="48" cy="48" r="44" fill="#162616" stroke="#7dc885" stroke-width="4" />
          <path d="M20 60 Q34 40 48 52 T76 36" fill="none" stroke="#7dc885" stroke-width="8" stroke-linecap="round" />
          <rect x="28" y="52" width="8" height="24" rx="4" fill="#7dc885" />
          <rect x="42" y="42" width="8" height="34" rx="4" fill="#9dde98" />
          <rect x="56" y="56" width="8" height="20" rx="4" fill="#7dc885" />
          <rect x="70" y="36" width="8" height="40" rx="4" fill="#9dde98" />
        </svg>
      </div>
      <h1>Connecting Spotify</h1>
      <p>Finishing the authentication flow and returning you to MixifyStats.</p>
      <div style="margin-top: 18px; font-size: 1.2rem;">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>

    <script>
      const STORAGE_KEYS = {
        accessToken: 'mixifystats_access_token',
        refreshToken: 'mixifystats_refresh_token',
        expiresAt: 'mixifystats_expires_at',
        codeVerifier: 'mixifystats_code_verifier',
        authState: 'mixifystats_auth_state',
      };

      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const state = params.get('state');
      const error = params.get('error');

      function storeValue(key, value) {
        window.localStorage.setItem(key, value);
      }

      function getAppBaseUrl() {
        const { origin, pathname } = window.location;
        const trimmedPath = pathname.replace(/\/+$/, '');
        const segments = trimmedPath.split('/').filter(Boolean);

        if (segments.length && ['callback', 'callback.html'].includes(segments[segments.length - 1])) {
          segments.pop();
        }

        const normalizedPath = segments.length ? `/${segments.join('/')}/` : '/';
        return `${origin}${normalizedPath}`;
      }

      function getRedirectUri() {
        const origin = window.location.origin;
        const path = window.location.pathname;
        if (origin && origin !== 'null' && origin !== 'file://') {
          return `${origin}${path}`;
        }
        return 'http://127.0.0.1:3000/callback.html';
      }

      const DEFAULT_CLIENT_ID = 'b340c0f1c1f142329516f6be01b436bd';

      async function exchangeWithBackend(body) {
        try {
          const response = await fetch('/api/token', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(body),
          });

          if (!response.ok) {
            return null;
          }

          return await response.json();
        } catch (_err) {
          return null;
        }
      }

      async function exchangeDirect(body) {
        try {
          const response = await fetch('https://accounts.spotify.com/api/token', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: new URLSearchParams(body).toString(),
          });

          if (!response.ok) {
            return null;
          }

          return await response.json();
        } catch (_err) {
          return null;
        }
      }

      async function finishAuth() {
        if (error) {
          window.location.href = getAppBaseUrl();
          return;
        }

        const redirectUri = getRedirectUri();
        const codeVerifier = window.localStorage.getItem(STORAGE_KEYS.codeVerifier);
        const expectedState = window.localStorage.getItem(STORAGE_KEYS.authState);

        if (!code || !codeVerifier || state !== expectedState) {
          window.location.href = getAppBaseUrl();
          return;
        }

        const tokenRequestBody = {
          grant_type: 'authorization_code',
          code,
          redirect_uri: redirectUri,
          code_verifier: codeVerifier,
        };

        const isLocalhost = ['127.0.0.1', 'localhost', '::1'].includes(window.location.hostname);
        let data = await exchangeWithBackend(tokenRequestBody);
        if (!data && isLocalhost) {
          data = await exchangeDirect(tokenRequestBody);
        }

        if (data && data.access_token) {
          storeValue(STORAGE_KEYS.accessToken, data.access_token);
          storeValue(STORAGE_KEYS.refreshToken, data.refresh_token || '');
          storeValue(STORAGE_KEYS.expiresAt, String(Date.now() + data.expires_in * 1000));
        } else {
          console.error('Token exchange failed', { isLocalhost, backend: !!data });
          if (!isLocalhost) {
            window.location.href = `${getAppBaseUrl()}?auth_error=token_exchange_failed`;
            return;
          }
        }

        window.localStorage.removeItem(STORAGE_KEYS.codeVerifier);
        window.localStorage.removeItem(STORAGE_KEYS.authState);
        window.location.href = getAppBaseUrl();
      }

      finishAuth();
    </script>
  </body>
</html>
